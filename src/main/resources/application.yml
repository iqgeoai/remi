spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/remi}
    username: ${DB_USER:remi}
    password: ${DB_PASS:remi}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
logging:
  level:
    com.remi: INFO
