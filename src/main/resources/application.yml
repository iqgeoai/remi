spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/remi}
    username: ${DB_USER:remi}
    password: ${DB_PASS:remi}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
server:
  port: 8080
logging:
  level:
    com.remi: INFO

jwt:
  secret: ${JWT_SECRET:}
  access-ttl: PT15M
  refresh-ttl: P30D

mail:
  from: ${MAIL_FROM:noreply@remi.local}
  verification-link-base: ${MAIL_VERIFICATION_LINK_BASE:http://localhost:8080/verify}
  reset-link-base: ${MAIL_RESET_LINK_BASE:http://localhost:8080/reset}

game-timer:
  hard-timeout: PT3M
